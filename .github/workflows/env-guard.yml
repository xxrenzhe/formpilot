name: Guard Env Files

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-env-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block committed .env files
        run: bash infra/scripts/guard-env-files.sh tracked

      - name: Guard landing and recharge funnel
        run: bash infra/scripts/qa-landing-recharge-funnel.sh
